<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div style="padding:16px; border:1px solid var(--border); border-radius:8px;">
  <div style="display:grid; grid-template-columns:repeat(10,1fr); gap:14px; align-items:center; justify-items:center;">
    <i data-lucide="wallet"></i>
    <i data-lucide="refresh-cw"></i>
    <i data-lucide="bar-chart-3"></i>
    <i data-lucide="tags"></i>
    <i data-lucide="sliders-horizontal"></i>
    <i data-lucide="plus"></i>
    <i data-lucide="moon"></i>
    <i data-lucide="pencil"></i>
    <i data-lucide="trash-2"></i>
    <i data-lucide="search"></i>
  </div>
  <div style="margin-top:12px; font-size:11px; color:var(--text-muted); text-align:center;">
    <a href="https://lucide.dev" style="color:var(--accent); text-decoration:underline; text-underline-offset:2px;">Lucide</a> · 16px stroke 1.5 · inherits color
  </div>
</div>
<script>
  lucide.createIcons({ attrs: { width: 16, height: 16, 'stroke-width': 1.5, color: '#0f0f14' } });
</script>
</body></html>
