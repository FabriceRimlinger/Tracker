<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:8px;">
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="display:inline-block; width:10px; height:10px; border-radius:999px; background:#1f9d55;"></span>
      <div class="label">Success</div>
    </div>
    <div class="code" style="margin-bottom:10px;">#1f9d55</div>
    <div style="font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:13px; color:#1f9d55;">+12,34%</div>
  </div>
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="display:inline-block; width:10px; height:10px; border-radius:999px; background:#c8312b;"></span>
      <div class="label">Danger</div>
    </div>
    <div class="code" style="margin-bottom:10px;">#c8312b</div>
    <div style="font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:13px; color:#c8312b;">−1 280 €</div>
  </div>
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="display:inline-block; width:10px; height:10px; border-radius:999px; background:#b97a00;"></span>
      <div class="label">Warning</div>
    </div>
    <div class="code" style="margin-bottom:10px;">#b97a00</div>
    <div style="font-size:13px; color:#b97a00;">Versements à mettre à jour</div>
  </div>
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span style="display:inline-block; width:10px; height:10px; border-radius:999px; background:#5e6ad2;"></span>
      <div class="label">Info</div>
    </div>
    <div class="code" style="margin-bottom:10px;">#5e6ad2</div>
    <div style="font-size:13px; color:#5e6ad2;">Synchronisation en cours</div>
  </div>
</div>
</body></html>
