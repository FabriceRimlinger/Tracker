<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:0; align-items:stretch; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
  <div style="flex:1; padding:14px 12px; border-right:1px solid var(--border);">
    <div style="width:32px; height:32px; border-radius:4px; border:1px solid var(--border); margin-bottom:8px;"></div>
    <div class="label">4px · xs</div><div class="code">kbd, chips</div>
  </div>
  <div style="flex:1; padding:14px 12px; border-right:1px solid var(--border);">
    <div style="width:36px; height:32px; border-radius:6px; border:1px solid var(--border); margin-bottom:8px;"></div>
    <div class="label">6px · sm</div><div class="code">buttons, inputs</div>
  </div>
  <div style="flex:1; padding:14px 12px; border-right:1px solid var(--border);">
    <div style="width:40px; height:32px; border-radius:8px; border:1px solid var(--border); margin-bottom:8px;"></div>
    <div class="label">8px · md</div><div class="code">cards (max)</div>
  </div>
  <div style="flex:1; padding:14px 12px;">
    <div style="width:44px; height:18px; border-radius:999px; border:1px solid var(--border); margin-bottom:8px;"></div>
    <div class="label">pill</div><div class="code">status dot only</div>
  </div>
</div>
<div style="margin-top:8px; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:11px; color:var(--text-muted);">
  Don't round corners beyond 8px. Pills reserved for status dots, not for chrome.
</div>
</body></html>
