<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:0; align-items:flex-end;">
  <div style="flex:0 0 auto; display:flex; align-items:flex-end; gap:0; padding:16px; border:1px solid var(--border); border-radius:8px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:4px; height:4px; background:var(--accent);"></div><div class="code">4</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:8px; height:8px; background:var(--accent);"></div><div class="code">8</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:12px; height:12px; background:var(--accent);"></div><div class="code">12</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:16px; height:16px; background:var(--accent);"></div><div class="code">16</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:24px; height:24px; background:var(--accent);"></div><div class="code">24</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:32px; height:32px; background:var(--accent);"></div><div class="code">32</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:48px; height:48px; background:var(--accent);"></div><div class="code">48</div></div>
    <div style="width:8px;"></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:64px; height:64px; background:var(--accent);"></div><div class="code">64</div></div>
  </div>
  <div style="flex:1; padding:16px 0 16px 16px;">
    <div class="label" style="margin-bottom:4px;">4px base unit</div>
    <div style="font-size:11px; color:var(--text-muted); line-height:1.5;">4 / 8 / 12 / 16 / 24 / 32 / 48 / 64. Dense by default — information per pixel is the goal.</div>
  </div>
</div>
</body></html>
