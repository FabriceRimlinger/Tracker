<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:8px; align-items:stretch;">
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; background:#fafafa;">
    <div class="label" style="margin-bottom:6px;">Card · default</div>
    <div class="code">1px solid #e4e4e7</div>
  </div>
  <div style="flex:1; padding:16px; border:1px solid #d4d4d8; border-radius:8px; background:#fafafa;">
    <div class="label" style="margin-bottom:6px;">Card · hover</div>
    <div class="code">border: #d4d4d8</div>
  </div>
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
    <div class="label" style="margin-bottom:6px;">Popover</div>
    <div class="code">0 2px 8px rgba(0,0,0,.04)</div>
  </div>
</div>
<div style="margin-top:8px; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:11px; color:var(--text-muted);">
  Flat. Border-based depth. Shadows reserved for popovers and dropdowns.
</div>
</body></html>
