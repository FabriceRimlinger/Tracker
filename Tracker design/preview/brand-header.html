<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:8px; align-items:stretch;">
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px;">
    <div style="font-size:13px; font-weight:500; margin-bottom:8px;">Mon Portefeuille</div>
    <div style="font-size:11px; color:var(--text-muted); margin-bottom:12px;">No logo. Wordmark only.</div>
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:18px; font-weight:600; letter-spacing:-0.005em;">Mon Portefeuille</span>
      <span class="tk-kbd">⌘</span><span class="tk-kbd">K</span>
    </div>
  </div>
  <div style="flex:0 0 220px; padding:16px; border:1px solid var(--border); border-radius:8px; background:#0f0f14; color:#fff;">
    <div style="font-size:11px; color:#a0a0ab; margin-bottom:8px;">Dark variant</div>
    <div style="font-size:18px; font-weight:600; letter-spacing:-0.005em;">Mon Portefeuille</div>
  </div>
</div>
</body></html>
