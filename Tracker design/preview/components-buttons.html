<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:8px; align-items:flex-start;">
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;">
    <button class="tk-btn tk-btn--primary">Continue</button>
    <div class="code">Primary · accent fill</div>
  </div>
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;">
    <button class="tk-btn tk-btn--secondary">Cancel</button>
    <div class="code">Secondary · surface + border</div>
  </div>
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;">
    <button class="tk-btn tk-btn--ghost">Skip</button>
    <div class="code">Ghost · text only</div>
  </div>
  <div style="flex:1; padding:16px; border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;">
    <div style="display:flex; gap:6px; align-items:center;">
      <button class="tk-btn tk-btn--secondary tk-btn--sm">Filter</button>
      <span class="tk-kbd">F</span>
    </div>
    <div class="code">Small + kbd hint</div>
  </div>
</div>
</body></html>
