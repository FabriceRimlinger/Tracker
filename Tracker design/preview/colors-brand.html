<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:0; align-items:stretch; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
  <div style="flex:0 0 200px; background:#5e6ad2; padding:18px 16px; color:#fff;">
    <div style="font-size:11px; font-weight:500; opacity:0.85; margin-bottom:8px;">Accent</div>
    <div style="font-family:var(--font-mono); font-size:13px;">#5e6ad2</div>
    <div style="font-size:11px; opacity:0.75; margin-top:18px;">Primary action · link · focus ring</div>
  </div>
  <div style="flex:1; padding:16px; display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="tk-btn tk-btn--primary">Continue</button>
      <span style="font-size:11px; color:var(--text-muted);">primary action</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <a href="#" style="color:var(--accent); font-size:13px; text-decoration:underline; text-underline-offset:2px;">View documentation</a>
      <span style="font-size:11px; color:var(--text-muted);">link underline</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <input class="tk-input" style="width:140px;" value="focused" autofocus>
      <span style="font-size:11px; color:var(--text-muted);">focus ring</span>
    </div>
  </div>
  <div style="flex:0 0 90px; background:#4e5acb; padding:14px 12px; color:#fff; border-left:1px solid rgba(255,255,255,0.12);">
    <div style="font-size:11px; opacity:0.85; margin-bottom:6px;">Hover</div>
    <div style="font-family:var(--font-mono); font-size:11px;">#4e5acb</div>
  </div>
</div>
<div style="margin-top:10px; padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--text-muted);">
  Rule: accent only on primary action, link underlines, and focus rings. <span style="color:var(--text);">Never on backgrounds.</span>
</div>
</body></html>
