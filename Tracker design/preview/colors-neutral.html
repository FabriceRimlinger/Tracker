<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div class="row" style="gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
  <div style="flex:1; background:#ffffff; padding:14px 12px;">
    <div style="height:24px; border:1px solid var(--border); border-radius:4px; background:#ffffff; margin-bottom:10px;"></div>
    <div class="label">Bg</div><div class="code">#ffffff</div>
  </div>
  <div style="flex:1; background:#fafafa; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="height:24px; background:#fafafa; border:1px solid var(--border); border-radius:4px; margin-bottom:10px;"></div>
    <div class="label">Bg-alt</div><div class="code">#fafafa</div>
  </div>
  <div style="flex:1; background:#f4f4f5; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="height:24px; background:#f4f4f5; border:1px solid var(--border); border-radius:4px; margin-bottom:10px;"></div>
    <div class="label">Surface</div><div class="code">#f4f4f5</div>
  </div>
  <div style="flex:1; background:#ffffff; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="height:24px; background:#e4e4e7; border-radius:4px; margin-bottom:10px;"></div>
    <div class="label">Border</div><div class="code">#e4e4e7</div>
  </div>
  <div style="flex:1; background:#ffffff; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="height:24px; background:#d4d4d8; border-radius:4px; margin-bottom:10px;"></div>
    <div class="label">Border strong</div><div class="code">#d4d4d8</div>
  </div>
</div>
<div class="row" style="margin-top:10px; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
  <div style="flex:1; padding:14px 12px;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
      <div style="width:24px; height:24px; background:#0f0f14; border-radius:4px;"></div>
      <div><div class="label">Text</div><div class="code">#0f0f14</div></div>
    </div>
  </div>
  <div style="flex:1; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:24px; height:24px; background:#6b6b76; border-radius:4px;"></div>
      <div><div class="label">Text muted</div><div class="code">#6b6b76</div></div>
    </div>
  </div>
  <div style="flex:1; padding:14px 12px; border-left:1px solid var(--border);">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:24px; height:24px; background:#a0a0ab; border-radius:4px;"></div>
      <div><div class="label">Text dim</div><div class="code">#a0a0ab</div></div>
    </div>
  </div>
</div>
</body></html>
