<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
  <div style="padding:16px; border:1px solid var(--border); border-radius:8px;">
    <div style="font-size:11px; font-weight:500; color:var(--text-muted); margin-bottom:8px;">Valorisation totale</div>
    <div style="font-size:36px; font-weight:600; letter-spacing:-0.005em; font-variant-numeric:tabular-nums; line-height:1;">797&nbsp;521&nbsp;€</div>
    <div style="margin-top:8px; font-size:13px; font-variant-numeric:tabular-nums; color:#1f9d55;">+12&nbsp;460&nbsp;€&nbsp;<span style="color:var(--text-muted);">aujourd'hui</span></div>
  </div>
  <div style="padding:16px; border:1px solid var(--border); border-radius:8px;">
    <div style="font-size:11px; font-weight:500; color:var(--text-muted); margin-bottom:8px;">Performance</div>
    <div style="font-size:36px; font-weight:600; letter-spacing:-0.005em; font-variant-numeric:tabular-nums; line-height:1; color:#1f9d55;">+18,42%</div>
    <div style="margin-top:8px; font-size:13px; font-variant-numeric:tabular-nums; color:var(--text-muted);">vs. versements nets</div>
  </div>
  <div style="padding:16px; border:1px solid var(--border); border-radius:8px;">
    <div style="font-size:11px; font-weight:500; color:var(--text-muted); margin-bottom:8px;">+/− value latente</div>
    <div style="font-size:36px; font-weight:600; letter-spacing:-0.005em; font-variant-numeric:tabular-nums; line-height:1;">+44&nbsp;120&nbsp;€</div>
    <div style="margin-top:8px; font-size:13px; font-variant-numeric:tabular-nums; color:var(--text-muted);">PRU agrégé</div>
  </div>
</div>
</body></html>
