<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card-base.css"></head>
<body>
<div style="display:flex; gap:8px; align-items:flex-start;">
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Libellé</label>
    <input class="tk-input" placeholder="ETF World" />
    <div class="code" style="margin-top:6px;">default</div>
  </div>
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">ISIN / Ticker</label>
    <input class="tk-input" value="VIE.PA" style="border-color:var(--accent); box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--accent-ring);" />
    <div class="code" style="margin-top:6px;">focused</div>
  </div>
  <div style="flex:1; padding:14px; border:1px solid var(--border); border-radius:8px;">
    <label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Compte</label>
    <div style="position:relative;">
      <select class="tk-input" style="appearance:none; padding-right:28px;">
        <option>CTO</option><option>PEA</option><option>A. Vie</option>
      </select>
      <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:10px;">▼</span>
    </div>
    <div class="code" style="margin-top:6px;">select</div>
  </div>
</div>
</body></html>
